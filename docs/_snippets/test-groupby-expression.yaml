pipelines:
  main:
    from: test_input
    via:
    - type: groupBy
      name: group_by_city
      mapper:
        expression: value['city']
    - type: aggregate
      store: aggregate_store
      initializer:
        expression: 0
        resultType: long
      aggregator:
        expression: aggregatedValue + 1
        resultType: long
    - type: toStream
    to: test_output
