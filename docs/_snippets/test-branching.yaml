pipelines:
  main:
    from: sensor_stream
    branch:
    - if:
        expression: value['color'] == 'blue'
      to: sensor_blue
    - if:
        expression: value['color'] == 'red'
      to: sensor_red
    - forEach:
        code: 'print(''Unknown color sensor: ''+str(value[''color'']))

          '
