pipelines:
  main:
    from: test_input
    via:
    - type: groupBy
      name: group_by_city
      mapper:
        resultType: string
        code: 'discriminator = value["city"]

          '
        expression: discriminator
    - type: aggregate
      store: aggregate_store
      initializer:
        expression: 0
        resultType: long
      aggregator:
        expression: aggregatedValue + 1
        resultType: long
    - type: toStream
    to: test_output
