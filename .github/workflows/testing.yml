name: workflow-test
on: push

jobs:
  testing:
    name: test working with tags
    runs-on: ubuntu-latest
    steps:
      - name: print current github environment
        run: |
          echo ${{ github }}
          echo github.ref is ${{ github.ref }}
          echo github.ref_name is ${{ github.ref_name }}
          echo github.ref_type is ${{ github.ref_type }}

      - name: set the version in env
        run: |
          echo "more testing"
          echo "${GITHUB_REF/refs\/tags\//}" 
          echo "github_tag=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: read version back from env
        run:
          echo "tag is ${{ env.github_tag }}"

      - name: set output for posterity
        run: echo "::set-output name=thetag::${{ env.github_tag }}"
        id: setter

    outputs:
      thetag2: ${{ env.github_tag }}

  after-testing:
    name: see if we can pick up the env
    runs-on: ubuntu-latest
    needs: testing
    if: needs.testing.outputs.thetag2 != ''
    steps:
      - name: here we are 
        run: echo "here we are"

      - name: can we still see the tag?
        run: |
          echo "now, tag is ${{ env.github_tag }}"
          echo and ${{ needs.testing.outputs.thetag2 }}

